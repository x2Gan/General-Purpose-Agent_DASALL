schema_version: 1
profile_meta:
	profile_id: edge_minimal
	target_platform: linux-arm64-embedded
	support_level: constrained
enabled_modules:
	runtime: true
	cognition: true
	llm_cloud_adapter: false
	llm_lan_adapter: false
	llm_local_adapter: true
	tools_builtin: true
	tools_mcp: false
	memory_vector: false
	memory_experience: false
	knowledge: false
	multi_agent: false
	platform_hal: true
	infra_observability: true
runtime_budget:
	worker_threads: 2
	max_memory_mb: 512
	max_tokens: 8000
	max_turns: 6
	max_tool_calls: 4
	max_latency_ms: 5000
	max_replan_count: 1
model_profile:
	planning:
		route: local.small
		fallback_route: builtin_only
		streaming_enabled: false
	execution:
		route: local.small
		fallback_route: builtin_only
		streaming_enabled: false
	reflection:
		route: local.small
		fallback_route: builtin_only
		streaming_enabled: false
	response:
		route: local.small
		fallback_route: builtin_only
		streaming_enabled: true
token_budget_policy:
	max_input_tokens: 3000
	max_output_tokens: 800
	max_history_turns: 4
	compression_threshold: 2000
prompt_policy:
	allowed_prompt_releases:
		- stable
	trusted_sources:
		- profiles
	tool_visibility_rules:
		- builtin:essential
capability_cache_policy:
	refresh_interval_ms: 10000
	expire_after_ms: 90000
	stale_read_allowed: true
	failure_backoff_ms: 2000
degrade_policy:
	fallback_chain:
		- builtin_only
	allow_model_failover: false
	allow_budget_degrade: true
timeout_policy:
	llm:
		timeout_ms: 1800
		retry_budget: 0
		circuit_breaker_threshold: 3
	tool:
		timeout_ms: 1200
		retry_budget: 0
		circuit_breaker_threshold: 2
	mcp:
		timeout_ms: 1000
		retry_budget: 0
		circuit_breaker_threshold: 1
	workflow:
		timeout_ms: 2500
		retry_budget: 0
		circuit_breaker_threshold: 2
execution_policy:
	requires_high_risk_confirmation: true
	safe_mode_enabled: true
	audit_level: minimal
	allowed_tool_domains:
		- builtin
infra:
	plugin:
		enabled: true
		allowlist:
			- plugin.echo
		search_paths:
			- ./plugins
			- ./plugins/minimal
		load_timeout_ms: 1800
		max_active: 4
		signature:
			required: true
		trust:
			min_level: internal
		abi:
			strict_mode: true
		remote_fetch:
			enabled: false
		safe_mode:
			fail_threshold: 1
	health:
		enabled: true
		liveness:
			interval_ms: 5000
		readiness:
			interval_ms: 8000
		probe:
			timeout_ms: 1500
			groups:
				critical:
					- logging
					- secret
					- config
		degraded:
			threshold: 2
		unhealthy:
			consecutive_failures: 3
		history:
			window_size: 12
		event_on_transition_only: true
		recovery_hint:
			enabled: false
	metrics:
		enabled: true
		provider:
			type: internal
		reader:
			interval_ms: 10000
		exporter:
			type: noop
			timeout_ms: 1000
		aggregation:
			temporality: cumulative
		queue:
			max_size: 512
			overflow_policy: drop_oldest
		labels:
			allowlist:
				- module
				- stage
				- profile
				- outcome
				- error_code
			max_cardinality_per_metric: 64
		histogram:
			default_buckets_seconds:
				- 0.005
				- 0.01
				- 0.025
				- 0.05
				- 0.1
				- 0.2
				- 0.3
				- 0.5
				- 1
				- 2
				- 5
		audit:
			on_policy_change: true
	watchdog:
		enabled: true
		scan:
			interval_ms: 1500
		timeout_ms: 20000
		grace_ms: 3000
		consecutive_miss_threshold: 3
		timeout:
			level:
				policy: critical_only
		event:
			queue_size: 256
			overflow_policy: block
		recovery_hint:
			enabled: false
		audit:
			required: true
		max_entities: 128
		safe_mode:
			scan_interval_ms: 4000
daemon:
	socket_path: /tmp/dasall/control.sock
	listen_backlog: 32
	dispatch_timeout_ms: 5000
	diag:
		enabled: false
	watchdog:
		enabled: false
ops_policy:
	log_level: warn
	metrics_granularity: minimal
	trace_sample_ratio: 0.02
	remote_diagnostics_enabled: false
	upgrade_strategy: manual
