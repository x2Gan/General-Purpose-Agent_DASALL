schema_version: 1
profile_meta:
	profile_id: cloud_full
	target_platform: linux-x86_64-server
	support_level: ga
enabled_modules:
	runtime: true
	cognition: true
	llm_cloud_adapter: true
	llm_lan_adapter: true
	llm_local_adapter: false
	tools_builtin: true
	tools_mcp: true
	memory_vector: true
	memory_experience: true
	knowledge: true
	multi_agent: true
	platform_hal: false
	infra_observability: true
runtime_budget:
	worker_threads: 16
	max_memory_mb: 12288
	max_tokens: 96000
	max_turns: 32
	max_tool_calls: 32
	max_latency_ms: 9000
	max_replan_count: 4
model_profile:
	planner:
		route: cloud.reasoning
		fallback_route: lan.general
		streaming_enabled: false
	responder:
		route: cloud.general
		fallback_route: lan.general
		streaming_enabled: true
token_budget_policy:
	max_input_tokens: 20000
	max_output_tokens: 6000
	max_history_turns: 24
	compression_threshold: 16000
prompt_policy:
	allowed_prompt_releases:
		- stable
		- canary
	trusted_sources:
		- profiles
		- infra_config
		- deployment_override
	tool_visibility_rules:
		- builtin:all
		- mcp:trusted
capability_cache_policy:
	refresh_interval_ms: 20000
	expire_after_ms: 180000
	stale_read_allowed: false
	failure_backoff_ms: 4000
degrade_policy:
	fallback_chain:
		- lan.general
	allow_model_failover: true
	allow_budget_degrade: true
timeout_policy:
	llm:
		timeout_ms: 4000
		retry_budget: 2
		circuit_breaker_threshold: 6
	tool:
		timeout_ms: 3000
		retry_budget: 1
		circuit_breaker_threshold: 4
	mcp:
		timeout_ms: 2500
		retry_budget: 1
		circuit_breaker_threshold: 3
	workflow:
		timeout_ms: 6000
		retry_budget: 1
		circuit_breaker_threshold: 3
execution_policy:
	requires_high_risk_confirmation: true
	safe_mode_enabled: true
	audit_level: full
	allowed_tool_domains:
		- builtin
		- mcp
infra:
	plugin:
		enabled: true
		allowlist:
			- plugin.echo
			- plugin.metrics
			- plugin.remote.fetch
			- plugin.tools.bridge
		search_paths:
			- ./plugins
			- ./plugins/cloud
		load_timeout_ms: 3500
		max_active: 24
		signature:
			required: true
		trust:
			min_level: internal
		abi:
			strict_mode: true
		remote_fetch:
			enabled: false
		safe_mode:
			fail_threshold: 4
	health:
		enabled: true
		liveness:
			interval_ms: 1500
		readiness:
			interval_ms: 4000
		probe:
			timeout_ms: 800
			groups:
				critical:
					- logging
					- secret
					- config
		degraded:
			threshold: 1
		unhealthy:
			consecutive_failures: 3
		history:
			window_size: 32
		event_on_transition_only: true
		recovery_hint:
			enabled: true
	metrics:
		enabled: true
		provider:
			type: internal
		reader:
			interval_ms: 3000
		exporter:
			type: prom_text
			timeout_ms: 1500
		aggregation:
			temporality: cumulative
		queue:
			max_size: 8192
			overflow_policy: drop_oldest
		labels:
			allowlist:
				- module
				- stage
				- profile
				- outcome
				- error_code
			max_cardinality_per_metric: 400
		histogram:
			default_buckets_seconds:
				- 0.005
				- 0.01
				- 0.025
				- 0.05
				- 0.1
				- 0.2
				- 0.3
				- 0.5
				- 1
				- 2
				- 5
		audit:
			on_policy_change: true
	watchdog:
		enabled: true
		scan:
			interval_ms: 400
		timeout_ms: 12000
		grace_ms: 1500
		consecutive_miss_threshold: 3
		timeout:
			level:
				policy: warn_then_critical
		event:
			queue_size: 4096
			overflow_policy: block
		recovery_hint:
			enabled: true
		audit:
			required: true
		max_entities: 2048
		safe_mode:
			scan_interval_ms: 2000
ops_policy:
	log_level: info
	metrics_granularity: full
	trace_sample_ratio: 0.15
	remote_diagnostics_enabled: true
	upgrade_strategy: rolling
