schema_version: 1
profile_meta:
	profile_id: cloud_full
	target_platform: linux-x86_64-server
	support_level: ga
enabled_modules:
	runtime: true
	cognition: true
	llm_cloud_adapter: true
	llm_lan_adapter: true
	llm_local_adapter: false
	tools_builtin: true
	tools_mcp: true
	memory_vector: true
	memory_experience: true
	knowledge: true
	multi_agent: true
	platform_hal: false
	infra_observability: true
runtime_budget:
	worker_threads: 16
	max_memory_mb: 12288
	max_tokens: 96000
	max_turns: 32
	max_tool_calls: 32
	max_latency_ms: 9000
	max_replan_count: 4
model_profile:
	planner:
		route: cloud.reasoning
		fallback_route: lan.general
		streaming_enabled: false
	responder:
		route: cloud.general
		fallback_route: lan.general
		streaming_enabled: true
token_budget_policy:
	max_input_tokens: 20000
	max_output_tokens: 6000
	max_history_turns: 24
	compression_threshold: 16000
prompt_policy:
	allowed_prompt_releases:
		- stable
		- canary
	trusted_sources:
		- profiles
		- infra_config
		- deployment_override
	tool_visibility_rules:
		- builtin:all
		- mcp:trusted
capability_cache_policy:
	refresh_interval_ms: 20000
	expire_after_ms: 180000
	stale_read_allowed: false
	failure_backoff_ms: 4000
degrade_policy:
	fallback_chain:
		- lan.general
	allow_model_failover: true
	allow_budget_degrade: true
timeout_policy:
	llm:
		timeout_ms: 4000
		retry_budget: 2
		circuit_breaker_threshold: 6
	tool:
		timeout_ms: 3000
		retry_budget: 1
		circuit_breaker_threshold: 4
	mcp:
		timeout_ms: 2500
		retry_budget: 1
		circuit_breaker_threshold: 3
	workflow:
		timeout_ms: 6000
		retry_budget: 1
		circuit_breaker_threshold: 3
execution_policy:
	requires_high_risk_confirmation: true
	safe_mode_enabled: true
	audit_level: full
	allowed_tool_domains:
		- builtin
		- mcp
infra:
	plugin:
		enabled: true
		allowlist:
			- plugin.echo
			- plugin.metrics
			- plugin.remote.fetch
			- plugin.tools.bridge
		search_paths:
			- ./plugins
			- ./plugins/cloud
		load_timeout_ms: 3500
		max_active: 24
		signature:
			required: true
		trust:
			min_level: internal
		abi:
			strict_mode: true
		remote_fetch:
			enabled: false
		safe_mode:
			fail_threshold: 4
ops_policy:
	log_level: info
	metrics_granularity: full
	trace_sample_ratio: 0.15
	remote_diagnostics_enabled: true
	upgrade_strategy: rolling
