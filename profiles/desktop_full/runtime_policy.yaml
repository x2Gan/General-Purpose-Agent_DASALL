schema_version: 1
# MCP v1 transport 固定为 stdio-only。tools_mcp 只控制 MCP 治理通道启停，
# 不充当 transport selector；timeout_policy.mcp.* 与 capability_cache_policy.* 也不表达 SSE / streamable-HTTP 选择。
profile_meta:
	profile_id: desktop_full
	target_platform: linux-x86_64-workstation
	support_level: ga
enabled_modules:
	runtime: true
	cognition: true
	llm_cloud_adapter: true
	llm_lan_adapter: true
	llm_local_adapter: true
	tools_builtin: true
	tools_mcp: true
	memory_vector: true
	memory_experience: true
	knowledge: true
	multi_agent: false
	platform_hal: false
	infra_observability: true
runtime_budget:
	worker_threads: 12
	max_memory_mb: 8192
	max_tokens: 64000
	max_turns: 24
	max_tool_calls: 24
	max_latency_ms: 8000
	max_replan_count: 3
model_profile:
	planning:
		route: cloud.reasoning
		fallback_route: lan.general
		streaming_enabled: false
	execution:
		route: cloud.reasoning
		fallback_route: lan.general
		streaming_enabled: false
	reflection:
		route: cloud.reasoning
		fallback_route: lan.general
		streaming_enabled: false
	response:
		route: cloud.general
		fallback_route: local.small
		streaming_enabled: true
token_budget_policy:
	max_input_tokens: 16000
	max_output_tokens: 4000
	max_history_turns: 18
	compression_threshold: 12000
prompt_policy:
	allowed_prompt_releases:
		- stable
		- canary
	trusted_sources:
		- profiles
		- infra_config
	tool_visibility_rules:
		- builtin:all
		- mcp:trusted
capability_cache_policy:
	refresh_interval_ms: 30000
	expire_after_ms: 180000
	stale_read_allowed: false
	failure_backoff_ms: 5000
degrade_policy:
	fallback_chain:
		- lan.general
		- local.small
	allow_model_failover: true
	allow_budget_degrade: true
timeout_policy:
	llm:
		timeout_ms: 30000
		retry_budget: 2
		circuit_breaker_threshold: 5
	tool:
		timeout_ms: 2500
		retry_budget: 1
		circuit_breaker_threshold: 4
	mcp:
		timeout_ms: 2000
		retry_budget: 1
		circuit_breaker_threshold: 3
	workflow:
		timeout_ms: 5000
		retry_budget: 1
		circuit_breaker_threshold: 3
execution_policy:
	requires_high_risk_confirmation: true
	safe_mode_enabled: true
	audit_level: full
	allowed_tool_domains:
		- builtin
		- mcp
infra:
	plugin:
		enabled: true
		allowlist:
			- plugin.echo
			- plugin.metrics
			- plugin.tools.bridge
		search_paths:
			- ./plugins
			- ./plugins/desktop
		load_timeout_ms: 3000
		max_active: 16
		signature:
			required: true
		trust:
			min_level: internal
		abi:
			strict_mode: true
		remote_fetch:
			enabled: false
		safe_mode:
			fail_threshold: 3
	health:
		enabled: true
		liveness:
			interval_ms: 2000
		readiness:
			interval_ms: 5000
		probe:
			timeout_ms: 1000
			groups:
				critical:
					- logging
					- secret
					- config
		degraded:
			threshold: 1
		unhealthy:
			consecutive_failures: 3
		history:
			window_size: 24
		event_on_transition_only: true
		recovery_hint:
			enabled: true
	metrics:
		enabled: true
		provider:
			type: internal
		reader:
			interval_ms: 5000
		exporter:
			type: prom_text
			timeout_ms: 2000
		aggregation:
			temporality: cumulative
		queue:
			max_size: 4096
			overflow_policy: drop_oldest
		labels:
			allowlist:
				- module
				- stage
				- profile
				- outcome
				- error_code
			max_cardinality_per_metric: 300
		histogram:
			default_buckets_seconds:
				- 0.005
				- 0.01
				- 0.025
				- 0.05
				- 0.1
				- 0.2
				- 0.3
				- 0.5
				- 1
				- 2
				- 5
		audit:
			on_policy_change: true
	watchdog:
		enabled: true
		scan:
			interval_ms: 500
		timeout_ms: 15000
		grace_ms: 2000
		consecutive_miss_threshold: 3
		timeout:
			level:
				policy: warn_then_critical
		event:
			queue_size: 2048
			overflow_policy: block
		recovery_hint:
			enabled: true
		audit:
			required: true
		max_entities: 1024
		safe_mode:
			scan_interval_ms: 2000
daemon:
	socket_path: /run/dasall/daemon.sock
	listen_backlog: 32
	dispatch_timeout_ms: 5000
	diag:
		enabled: false
	watchdog:
		enabled: false
ops_policy:
	log_level: info
	metrics_granularity: full
	trace_sample_ratio: 0.2
	remote_diagnostics_enabled: true
	upgrade_strategy: staged
