schema_version: 1
# MCP v1 transport 固定为 stdio-only。tools_mcp 只控制 MCP 治理通道启停，
# 不充当 transport selector；timeout_policy.mcp.* 与 capability_cache_policy.* 也不表达 SSE / streamable-HTTP 选择。
profile_meta:
	profile_id: factory_test
	target_platform: linux-arm64-factory
	support_level: diagnostic
enabled_modules:
	runtime: true
	cognition: true
	llm_cloud_adapter: false
	llm_lan_adapter: true
	llm_local_adapter: true
	tools_builtin: true
	tools_mcp: false
	memory_vector: false
	memory_experience: false
	knowledge: false
	multi_agent: false
	platform_hal: true
	infra_observability: true
runtime_budget:
	worker_threads: 4
	max_memory_mb: 1024
	max_tokens: 12000
	max_turns: 8
	max_tool_calls: 8
	max_latency_ms: 6000
	max_replan_count: 2
model_profile:
	planning:
		route: lan.diagnostic
		fallback_route: local.small
		streaming_enabled: false
	execution:
		route: lan.diagnostic
		fallback_route: local.small
		streaming_enabled: false
	reflection:
		route: lan.diagnostic
		fallback_route: local.small
		streaming_enabled: false
	response:
		route: local.small
		fallback_route: lan.diagnostic
		streaming_enabled: true
token_budget_policy:
	max_input_tokens: 4000
	max_output_tokens: 1200
	max_history_turns: 6
	compression_threshold: 2500
prompt_policy:
	allowed_prompt_releases:
		- stable
	trusted_sources:
		- profiles
		- factory_console
	tool_visibility_rules:
		- builtin:all
capability_cache_policy:
	refresh_interval_ms: 12000
	expire_after_ms: 60000
	stale_read_allowed: true
	failure_backoff_ms: 1500
degrade_policy:
	fallback_chain:
		- local.small
		- builtin_only
	allow_model_failover: true
	allow_budget_degrade: true
timeout_policy:
	llm:
		timeout_ms: 2200
		retry_budget: 1
		circuit_breaker_threshold: 3
	tool:
		timeout_ms: 1500
		retry_budget: 1
		circuit_breaker_threshold: 2
	mcp:
		timeout_ms: 1200
		retry_budget: 0
		circuit_breaker_threshold: 1
	workflow:
		timeout_ms: 3000
		retry_budget: 0
		circuit_breaker_threshold: 2
execution_policy:
	requires_high_risk_confirmation: true
	safe_mode_enabled: true
	audit_level: elevated
	allowed_tool_domains:
		- builtin
infra:
	plugin:
		enabled: true
		allowlist:
			- plugin.echo
			- plugin.factory.diagnostics
		search_paths:
			- ./plugins
			- ./plugins/factory
		load_timeout_ms: 2200
		max_active: 6
		signature:
			required: true
		trust:
			min_level: internal
		abi:
			strict_mode: true
		remote_fetch:
			enabled: false
		safe_mode:
			fail_threshold: 2
	health:
		enabled: true
		liveness:
			interval_ms: 1000
		readiness:
			interval_ms: 2500
		probe:
			timeout_ms: 700
			groups:
				critical:
					- logging
					- secret
					- config
		degraded:
			threshold: 1
		unhealthy:
			consecutive_failures: 2
		history:
			window_size: 24
		event_on_transition_only: true
		recovery_hint:
			enabled: true
	metrics:
		enabled: true
		provider:
			type: internal
		reader:
			interval_ms: 2000
		exporter:
			type: prom_text
			timeout_ms: 1200
		aggregation:
			temporality: cumulative
		queue:
			max_size: 4096
			overflow_policy: drop_oldest
		labels:
			allowlist:
				- module
				- stage
				- profile
				- outcome
				- error_code
			max_cardinality_per_metric: 256
		histogram:
			default_buckets_seconds:
				- 0.005
				- 0.01
				- 0.025
				- 0.05
				- 0.1
				- 0.2
				- 0.3
				- 0.5
				- 1
				- 2
				- 5
		audit:
			on_policy_change: true
	watchdog:
		enabled: true
		scan:
			interval_ms: 700
		timeout_ms: 10000
		grace_ms: 1000
		consecutive_miss_threshold: 2
		timeout:
			level:
				policy: critical_only
		event:
			queue_size: 512
			overflow_policy: block
		recovery_hint:
			enabled: true
		audit:
			required: true
		max_entities: 256
		safe_mode:
			scan_interval_ms: 2500
daemon:
	socket_path: /run/dasall/daemon.sock
	listen_backlog: 32
	dispatch_timeout_ms: 5000
	diag:
		enabled: false
	watchdog:
		enabled: false
ops_policy:
	log_level: debug
	metrics_granularity: full
	trace_sample_ratio: 0.5
	remote_diagnostics_enabled: true
	upgrade_strategy: hold
