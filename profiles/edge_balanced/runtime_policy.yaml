schema_version: 1
profile_meta:
	profile_id: edge_balanced
	target_platform: linux-arm64-embedded
	support_level: ga
enabled_modules:
	runtime: true
	cognition: true
	llm_cloud_adapter: true
	llm_lan_adapter: true
	llm_local_adapter: true
	tools_builtin: true
	tools_mcp: true
	memory_vector: true
	memory_experience: true
	knowledge: true
	multi_agent: false
	platform_hal: true
	infra_observability: true
runtime_budget:
	worker_threads: 6
	max_memory_mb: 2048
	max_tokens: 24000
	max_turns: 12
	max_tool_calls: 10
	max_latency_ms: 7000
	max_replan_count: 2
model_profile:
	planner:
		route: lan.general
		fallback_route: cloud.reasoning
		streaming_enabled: false
	responder:
		route: lan.general
		fallback_route: local.small
		streaming_enabled: true
token_budget_policy:
	max_input_tokens: 8000
	max_output_tokens: 2000
	max_history_turns: 10
	compression_threshold: 6000
prompt_policy:
	allowed_prompt_releases:
		- stable
	trusted_sources:
		- profiles
		- infra_config
	tool_visibility_rules:
		- builtin:all
		- mcp:trusted
capability_cache_policy:
	refresh_interval_ms: 15000
	expire_after_ms: 120000
	stale_read_allowed: true
	failure_backoff_ms: 3000
degrade_policy:
	fallback_chain:
		- local.small
		- builtin_only
	allow_model_failover: true
	allow_budget_degrade: true
timeout_policy:
	llm:
		timeout_ms: 2500
		retry_budget: 1
		circuit_breaker_threshold: 4
	tool:
		timeout_ms: 1800
		retry_budget: 1
		circuit_breaker_threshold: 3
	mcp:
		timeout_ms: 1500
		retry_budget: 0
		circuit_breaker_threshold: 2
	workflow:
		timeout_ms: 4000
		retry_budget: 1
		circuit_breaker_threshold: 2
execution_policy:
	requires_high_risk_confirmation: true
	safe_mode_enabled: true
	audit_level: standard
	allowed_tool_domains:
		- builtin
		- mcp
infra:
	plugin:
		enabled: true
		allowlist:
			- plugin.echo
			- plugin.edge.telemetry
		search_paths:
			- ./plugins
			- ./plugins/edge
		load_timeout_ms: 2500
		max_active: 8
		signature:
			required: true
		trust:
			min_level: internal
		abi:
			strict_mode: true
		remote_fetch:
			enabled: false
		safe_mode:
			fail_threshold: 2
	health:
		enabled: true
		liveness:
			interval_ms: 3000
		readiness:
			interval_ms: 6000
		probe:
			timeout_ms: 1200
			groups:
				critical:
					- logging
					- secret
					- config
		degraded:
			threshold: 1
		unhealthy:
			consecutive_failures: 3
		history:
			window_size: 16
		event_on_transition_only: true
		recovery_hint:
			enabled: true
	metrics:
		enabled: true
		provider:
			type: internal
		reader:
			interval_ms: 7000
		exporter:
			type: prom_text
			timeout_ms: 1800
		aggregation:
			temporality: cumulative
		queue:
			max_size: 2048
			overflow_policy: drop_oldest
		labels:
			allowlist:
				- module
				- stage
				- profile
				- outcome
				- error_code
			max_cardinality_per_metric: 150
		histogram:
			default_buckets_seconds:
				- 0.005
				- 0.01
				- 0.025
				- 0.05
				- 0.1
				- 0.2
				- 0.3
				- 0.5
				- 1
				- 2
				- 5
		audit:
			on_policy_change: true
	watchdog:
		enabled: true
		scan:
			interval_ms: 800
		timeout_ms: 18000
		grace_ms: 2500
		consecutive_miss_threshold: 3
		timeout:
			level:
				policy: warn_then_critical
		event:
			queue_size: 1024
			overflow_policy: block
		recovery_hint:
			enabled: true
		audit:
			required: true
		max_entities: 512
		safe_mode:
			scan_interval_ms: 3000
ops_policy:
	log_level: info
	metrics_granularity: partial
	trace_sample_ratio: 0.08
	remote_diagnostics_enabled: true
	upgrade_strategy: canary
