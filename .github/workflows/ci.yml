name: DASALL-CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-22.04
    env:
      CMAKE_GENERATOR: Ninja
      CMAKE_BUILD_TYPE: RelWithDebInfo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ clang-tidy cppcheck

      - name: Build
        run: bash scripts/ci/build.sh

      - name: Unit tests
        run: bash scripts/ci/unit_tests.sh

      - name: Contract tests
        run: bash scripts/ci/contract_tests.sh

      - name: Static checks
        run: bash scripts/ci/static_check.sh

  memory_tsan_stress:
    runs-on: ubuntu-22.04
    env:
      CMAKE_GENERATOR: Ninja
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Run memory_tsan_stress
        run: bash scripts/ci/memory_tsan_stress.sh
