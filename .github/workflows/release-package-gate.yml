name: DASALL-Release-Package-Gate

"on":
  workflow_dispatch:
    inputs:
      qemu_image:
        description: Absolute path to the autopkgtest qemu image on the self-hosted runner
        required: true
        type: string
      deepseek_key_file:
        description: Absolute path to the host-side DeepSeek key file on the self-hosted runner
        required: true
        type: string
      build_dir:
        description: CMake build directory passed to the qemu gate wrapper
        required: true
        default: build/vscode-linux-ninja
        type: string
      provider_probe_url:
        description: HTTPS endpoint used for provider reachability preflight inside the testbed
        required: true
        default: https://api.deepseek.com
        type: string
      timeout_reboot:
        description: autopkgtest-virt-qemu reboot timeout in seconds
        required: true
        default: "180"
        type: string
      disable_kvm:
        description: Export AUTOPKGTEST_QEMU_DISABLE_KVM=1 for runners without KVM
        required: true
        default: true
        type: boolean

jobs:
  release-package-gate:
    runs-on:
      - self-hosted
      - linux
      - x64
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ dpkg-dev lintian autopkgtest qemu-system-x86 python3 curl

      - name: Prepare release inputs
        env:
          DEEPSEEK_KEY_FILE: ${{ inputs.deepseek_key_file }}
          PROVIDER_PROBE_URL: ${{ inputs.provider_probe_url }}
          BUILD_DIR: ${{ inputs.build_dir }}
        run: |
          set -eu
          [ -f "${DEEPSEEK_KEY_FILE}" ] || {
            printf 'missing DeepSeek key file: %s\n' "${DEEPSEEK_KEY_FILE}" >&2
            exit 1
          }

          setup_dir="${RUNNER_TEMP}/dasall-release-gate"
          artifact_dir="${setup_dir}/artifacts"
          package_dir="${artifact_dir}/packages"
          autopkgtest_dir="${artifact_dir}/autopkgtest"
          package_smoke_dir="${artifact_dir}/package-smoke"
          infra_soak_dir="${artifact_dir}/infra-soak"
          services_soak_dir="${artifact_dir}/services-soak"
          knowledge_proof_dir="${artifact_dir}/knowledge-proof"
          knowledge_soak_dir="${artifact_dir}/knowledge-soak"
          knowledge_failure_dir="${artifact_dir}/knowledge-failure"
          setup_file="${setup_dir}/autopkgtest-setup.sh"
          secret_record="${artifact_dir}/secret-injection-record.txt"
          package_smoke_log="${artifact_dir}/package-smoke-local.log"
          infra_soak_log="${artifact_dir}/infra-soak.log"
          services_soak_log="${artifact_dir}/services-soak.log"
          knowledge_proof_log="${artifact_dir}/knowledge-proof.log"
          knowledge_soak_log="${artifact_dir}/knowledge-soak.log"
          knowledge_failure_log="${artifact_dir}/knowledge-failure-injection.log"
          testbed_secret_path='/tmp/dasall-release/deepseek.key'

          mkdir -p "${artifact_dir}" "${package_dir}" "${autopkgtest_dir}" "${package_smoke_dir}" "${infra_soak_dir}" "${services_soak_dir}" "${knowledge_proof_dir}" "${knowledge_soak_dir}" "${knowledge_failure_dir}"

          {
            printf '%s\n' '#!/bin/sh'
            printf '%s\n' 'set -eu'
            printf '%s\n' 'command -v curl >/dev/null 2>&1'
            printf "curl -fsSIL --connect-timeout 15 '%s' >/dev/null\n" "${PROVIDER_PROBE_URL}"
          } > "${setup_file}"
          chmod 755 "${setup_file}"

          {
            printf 'DASALL_BUILD_DIR=%s\n' "${BUILD_DIR}"
            printf 'DASALL_DEEPSEEK_API_KEY_FILE=%s\n' "${DEEPSEEK_KEY_FILE}"
            printf 'DASALL_AUTOPKGTEST_OUTPUT_DIR=%s\n' "${autopkgtest_dir}"
            printf 'DASALL_AUTOPKGTEST_SETUP_COMMANDS=%s\n' "${setup_file}"
            printf 'DASALL_AUTOPKGTEST_TESTBED_SECRET_PATH=%s\n' "${testbed_secret_path}"
            printf 'DASALL_RELEASE_GATE_ARTIFACT_DIR=%s\n' "${artifact_dir}"
            printf 'DASALL_RELEASE_GATE_PACKAGE_DIR=%s\n' "${package_dir}"
            printf 'DASALL_RELEASE_GATE_SECRET_RECORD=%s\n' "${secret_record}"
            printf 'DASALL_PACKAGE_SMOKE_ARTIFACT_DIR=%s\n' "${package_smoke_dir}"
            printf 'DASALL_RELEASE_GATE_PACKAGE_SMOKE_LOG=%s\n' "${package_smoke_log}"
            printf 'DASALL_INFRA_RELEASE_SOAK_ARTIFACT_DIR=%s\n' "${infra_soak_dir}"
            printf 'DASALL_RELEASE_GATE_INFRA_SOAK_LOG=%s\n' "${infra_soak_log}"
            printf 'DASALL_CAPABILITY_SERVICES_SOAK_ARTIFACT_DIR=%s\n' "${services_soak_dir}"
            printf 'DASALL_RELEASE_GATE_SERVICES_SOAK_LOG=%s\n' "${services_soak_log}"
            printf 'DASALL_KNOWLEDGE_PROOF_ARTIFACT_DIR=%s\n' "${knowledge_proof_dir}"
            printf 'DASALL_RELEASE_GATE_KNOWLEDGE_PROOF_LOG=%s\n' "${knowledge_proof_log}"
            printf 'DASALL_KNOWLEDGE_SOAK_ARTIFACT_DIR=%s\n' "${knowledge_soak_dir}"
            printf 'DASALL_RELEASE_GATE_KNOWLEDGE_SOAK_LOG=%s\n' "${knowledge_soak_log}"
            printf 'DASALL_KNOWLEDGE_FAILURE_ARTIFACT_DIR=%s\n' "${knowledge_failure_dir}"
            printf 'DASALL_RELEASE_GATE_KNOWLEDGE_FAILURE_LOG=%s\n' "${knowledge_failure_log}"
          } >> "${GITHUB_ENV}"

      - name: Run local installed package evidence
        run: |
          set -eu
          smoke_log="${DASALL_RELEASE_GATE_PACKAGE_SMOKE_LOG}"

          {
            printf '### dpkg-buildpackage -us -uc -b\n'
          } > "${smoke_log}"

          dpkg-buildpackage -us -uc -b >> "${smoke_log}" 2>&1

          {
            printf '\n### bash scripts/packaging/pkg_smoke_install.sh --explicit-start-check\n'
          } >> "${smoke_log}"

          bash scripts/packaging/pkg_smoke_install.sh --explicit-start-check >> "${smoke_log}" 2>&1

      - name: Run local infra release / soak gate
        if: ${{ always() }}
        run: |
          set -eu
          soak_log="${DASALL_RELEASE_GATE_INFRA_SOAK_LOG}"

          {
            printf '### cmake --build %s --target dasall_infra_diagnostics_smoke_integration_test dasall_infra_diagnostics_integration_test dasall_health_wiring_integration_test dasall_infra_health_cadence_integration_test dasall_secret_failure_injection_integration_test dasall_plugin_lifecycle_state_unit_test dasall_metrics_failure_injection_integration_test\n' "${DASALL_BUILD_DIR}"
          } > "${soak_log}"

          cmake --build "${DASALL_BUILD_DIR}" --target \
            dasall_infra_diagnostics_smoke_integration_test \
            dasall_infra_diagnostics_integration_test \
            dasall_health_wiring_integration_test \
            dasall_infra_health_cadence_integration_test \
            dasall_secret_failure_injection_integration_test \
            dasall_plugin_lifecycle_state_unit_test \
            dasall_metrics_failure_injection_integration_test >> "${soak_log}" 2>&1

          {
            printf '\n### bash scripts/packaging/infra_release_soak_gate.sh --artifact-dir %s --build-dir %s\n' "${DASALL_INFRA_RELEASE_SOAK_ARTIFACT_DIR}" "${DASALL_BUILD_DIR}"
          } >> "${soak_log}"

          bash scripts/packaging/infra_release_soak_gate.sh \
            --artifact-dir "${DASALL_INFRA_RELEASE_SOAK_ARTIFACT_DIR}" \
            --build-dir "${DASALL_BUILD_DIR}" >> "${soak_log}" 2>&1

      - name: Run local installed knowledge proof
        if: ${{ always() }}
        run: |
          set -eu
          proof_log="${DASALL_RELEASE_GATE_KNOWLEDGE_PROOF_LOG}"

          {
            printf '### bash scripts/packaging/knowledge_local_installed_proof.sh --artifact-dir %s --hybrid-canary\n' "${DASALL_KNOWLEDGE_PROOF_ARTIFACT_DIR}"
          } > "${proof_log}"

          bash scripts/packaging/knowledge_local_installed_proof.sh \
            --artifact-dir "${DASALL_KNOWLEDGE_PROOF_ARTIFACT_DIR}" \
            --hybrid-canary >> "${proof_log}" 2>&1

      - name: Run local capability services soak
        if: ${{ always() }}
        run: |
          set -eu
          soak_log="${DASALL_RELEASE_GATE_SERVICES_SOAK_LOG}"

          {
            printf '### cmake --build %s --target dasall_services_failure_integration_test\n' "${DASALL_BUILD_DIR}"
          } > "${soak_log}"

          cmake --build "${DASALL_BUILD_DIR}" --target dasall_services_failure_integration_test >> "${soak_log}" 2>&1

          {
            printf '\n### bash scripts/packaging/services_subscription_adapter_soak.sh --artifact-dir %s --build-dir %s\n' "${DASALL_CAPABILITY_SERVICES_SOAK_ARTIFACT_DIR}" "${DASALL_BUILD_DIR}"
          } >> "${soak_log}"

          bash scripts/packaging/services_subscription_adapter_soak.sh \
            --artifact-dir "${DASALL_CAPABILITY_SERVICES_SOAK_ARTIFACT_DIR}" \
            --build-dir "${DASALL_BUILD_DIR}" >> "${soak_log}" 2>&1

      - name: Run local installed knowledge soak
        if: ${{ always() }}
        run: |
          set -eu
          soak_log="${DASALL_RELEASE_GATE_KNOWLEDGE_SOAK_LOG}"

          {
            printf '### bash scripts/packaging/knowledge_refresh_retrieve_soak.sh --artifact-dir %s --hybrid-canary\n' "${DASALL_KNOWLEDGE_SOAK_ARTIFACT_DIR}"
          } > "${soak_log}"

          bash scripts/packaging/knowledge_refresh_retrieve_soak.sh \
            --artifact-dir "${DASALL_KNOWLEDGE_SOAK_ARTIFACT_DIR}" \
            --hybrid-canary >> "${soak_log}" 2>&1

      - name: Run local installed knowledge failure injection
        if: ${{ always() }}
        run: |
          set -eu
          failure_log="${DASALL_RELEASE_GATE_KNOWLEDGE_FAILURE_LOG}"

          {
            printf '### bash scripts/packaging/knowledge_failure_injection_installed_proof.sh --artifact-dir %s\n' "${DASALL_KNOWLEDGE_FAILURE_ARTIFACT_DIR}"
          } > "${failure_log}"

          bash scripts/packaging/knowledge_failure_injection_installed_proof.sh \
            --artifact-dir "${DASALL_KNOWLEDGE_FAILURE_ARTIFACT_DIR}" >> "${failure_log}" 2>&1

      - name: Run qemu release gate
        env:
          QEMU_IMAGE: ${{ inputs.qemu_image }}
          TIMEOUT_REBOOT: ${{ inputs.timeout_reboot }}
          DISABLE_KVM: ${{ inputs.disable_kvm }}
        run: |
          set -eu
          [ -f "${QEMU_IMAGE}" ] || {
            printf 'missing qemu image: %s\n' "${QEMU_IMAGE}" >&2
            exit 1
          }

          artifact_dir="${DASALL_RELEASE_GATE_ARTIFACT_DIR}"
          package_dir="${DASALL_RELEASE_GATE_PACKAGE_DIR}"
          secret_record="${DASALL_RELEASE_GATE_SECRET_RECORD}"
          gate_log="${artifact_dir}/gate-int-10-qemu.log"
          lintian_log="${artifact_dir}/lintian.log"
          command_log="${artifact_dir}/release-gate-command.txt"
          version="$(dpkg-parsechangelog -SVersion)"
          arch="$(dpkg --print-architecture)"
          changes_file="../dasall_${version}_${arch}.changes"
          gate_status=0
          lintian_status=0

          if [ "${DISABLE_KVM}" = 'true' ]; then
            disable_flag='--disable-kvm'
          else
            disable_flag=''
          fi

          {
            printf 'build_dir=%s\n' "${DASALL_BUILD_DIR}"
            printf 'changes_file=%s\n' "${changes_file}"
            printf 'qemu_image=%s\n' "${QEMU_IMAGE}"
            printf 'timeout_reboot=%s\n' "${TIMEOUT_REBOOT}"
            printf 'disable_kvm=%s\n' "${DISABLE_KVM}"
            printf 'deepseek_key_file=provided\n'
            printf 'autopkgtest_output_dir=%s\n' "${DASALL_AUTOPKGTEST_OUTPUT_DIR}"
            printf 'package_artifact_dir=%s\n' "${package_dir}"
            printf 'testbed_secret_path=%s\n' "${DASALL_AUTOPKGTEST_TESTBED_SECRET_PATH}"
            printf 'provider_probe_url=%s\n' '${{ inputs.provider_probe_url }}'
          } > "${command_log}"

          {
            printf 'host_secret_file=provided\n'
            printf 'testbed_secret_path=%s\n' "${DASALL_AUTOPKGTEST_TESTBED_SECRET_PATH}"
            printf 'autopkgtest_injection=--copy + --env\n'
            printf 'provider_probe_url=%s\n' '${{ inputs.provider_probe_url }}'
          } > "${secret_record}"

          if [ -n "${disable_flag}" ]; then
            if sh scripts/packaging/validate_gate_int_10_installed_package_qemu.sh \
              "${disable_flag}" \
              -- /usr/bin/autopkgtest-virt-qemu --timeout-reboot="${TIMEOUT_REBOOT}" "${QEMU_IMAGE}" \
              > "${gate_log}" 2>&1; then
              :
            else
              gate_status=$?
            fi
          else
            if sh scripts/packaging/validate_gate_int_10_installed_package_qemu.sh \
              -- /usr/bin/autopkgtest-virt-qemu --timeout-reboot="${TIMEOUT_REBOOT}" "${QEMU_IMAGE}" \
              > "${gate_log}" 2>&1; then
              :
            else
              gate_status=$?
            fi
          fi

          if [ -f "${changes_file}" ]; then
            find .. -maxdepth 1 -type f \( \
              -name "*_${version}_*.changes" -o \
              -name "*_${version}_*.buildinfo" -o \
              -name "*_${version}_*.deb" -o \
              -name "*_${version}_*.ddeb" \
            \) -exec cp {} "${package_dir}/" \;

            if lintian "${changes_file}" > "${lintian_log}" 2>&1; then
              :
            else
              lintian_status=$?
            fi
          else
            printf 'missing changes file after release gate: %s\n' "${changes_file}" > "${lintian_log}"
            lintian_status=1
          fi

          {
            printf 'gate_status=%s\n' "${gate_status}"
            printf 'lintian_status=%s\n' "${lintian_status}"
          } >> "${command_log}"

          [ "${gate_status}" -eq 0 ] && [ "${lintian_status}" -eq 0 ]

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dasall-release-package-gate
          path: ${{ runner.temp }}/dasall-release-gate/artifacts